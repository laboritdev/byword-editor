name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Import signing certificate
        env:
          MACOS_BUILD_CERTIFICATE: ${{ secrets.MACOS_BUILD_CERTIFICATE }}
          MACOS_P12_PASSWORD: ${{ secrets.MACOS_P12_PASSWORD }}
        run: |
          if [[ -z "${MACOS_BUILD_CERTIFICATE}" ]]; then
            echo "MACOS_BUILD_CERTIFICATE not set; release will use ad-hoc signing."
            exit 0
          fi
          echo "$MACOS_BUILD_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain \
            -P "$MACOS_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain

      - name: Build app bundle
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x Scripts/build-app.sh Scripts/update-homebrew-cask.sh Scripts/sign-app.sh
          ./Scripts/build-app.sh "${{ steps.version.outputs.version }}" arm64

      - name: Read artifact metadata
        id: artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="dist/BywordEditor-${VERSION}-macos-arm64.zip"
          SHA256="$(cat "dist/BywordEditor-${VERSION}-macos-arm64.zip.sha256")"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew cask template
        run: |
          ./Scripts/update-homebrew-cask.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.artifact.outputs.sha256 }}" \
            arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.artifact.outputs.zip }}
          body: |
            ## Install

            ### Direct download
            Download `BywordEditor-${{ steps.version.outputs.version }}-macos-arm64.zip`, unzip, and move `BywordEditor.app` to `/Applications`.

            ### Homebrew
            ```bash
            brew tap laboritdev/tap
            brew install --cask byword-editor
            ```

            **SHA256:** `${{ steps.artifact.outputs.sha256 }}`

      - name: Publish Homebrew tap
        continue-on-error: true
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${TAP_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN not configured; skipping tap publish."
            echo "Update laboritdev/homebrew-tap manually with packaging/homebrew/Casks/byword-editor.rb"
            exit 0
          fi
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.artifact.outputs.sha256 }}"
          TAG="v${VERSION}"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/laboritdev/homebrew-tap.git" /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Casks
          cp packaging/homebrew/Casks/byword-editor.rb /tmp/homebrew-tap/Casks/byword-editor.rb

          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/byword-editor.rb
          git diff --staged --quiet || git commit -m "chore(cask): bump byword-editor to ${VERSION}"
          git push origin HEAD:master
