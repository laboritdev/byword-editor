name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0.3"

      - name: Resolve version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Build app bundle
        run: |
          chmod +x Scripts/build-app.sh Scripts/update-homebrew-cask.sh
          ./Scripts/build-app.sh "${{ steps.version.outputs.version }}" arm64

      - name: Read artifact metadata
        id: artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="dist/BywordEditor-${VERSION}-macos-arm64.zip"
          SHA256="$(cat "dist/BywordEditor-${VERSION}-macos-arm64.zip.sha256")"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew cask template
        run: |
          ./Scripts/update-homebrew-cask.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.artifact.outputs.sha256 }}" \
            arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.artifact.outputs.zip }}
          body: |
            ## Install

            ### Direct download
            Download `BywordEditor-${{ steps.version.outputs.version }}-macos-arm64.zip`, unzip, and move `BywordEditor.app` to `/Applications`.

            ### Homebrew
            ```bash
            brew tap laboritdev/tap
            brew install --cask byword-editor
            ```

            **SHA256:** `${{ steps.artifact.outputs.sha256 }}`

      - name: Publish Homebrew tap
        continue-on-error: true
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${TAP_TOKEN}" ]]; then
            echo "HOMEBREW_TAP_TOKEN not configured; skipping tap publish."
            echo "Update laboritdev/homebrew-tap manually with packaging/homebrew/Casks/byword-editor.rb"
            exit 0
          fi
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.artifact.outputs.sha256 }}"
          TAG="v${VERSION}"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/laboritdev/homebrew-tap.git" /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Casks
          cp packaging/homebrew/Casks/byword-editor.rb /tmp/homebrew-tap/Casks/byword-editor.rb

          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/byword-editor.rb
          git diff --staged --quiet || git commit -m "chore(cask): bump byword-editor to ${VERSION}"
          git push origin HEAD:master
